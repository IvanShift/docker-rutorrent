name: build

on:
  schedule:
    - cron: '15 23 * * 5'
  push:
    branches: [ "master" ]

env:
  IMAGE_NAME: ivanshift/rutorrent

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: latest
            filebot: false
          - flavor: filebot
            filebot: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Prepare build args
        id: prep
        run: |
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          rtorrent_branch="$(awk -F= '/^ARG RTORRENT_BRANCH=/{print $2}' Dockerfile)"
          echo "rtorrent_branch=${rtorrent_branch}" >> "$GITHUB_OUTPUT"
          echo "rtorrent_version=${rtorrent_branch#v}" >> "$GITHUB_OUTPUT"

      - name: Set Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ matrix.flavor == 'latest' }}
            type=raw,value=rtorrent-${{ steps.prep.outputs.rtorrent_version }},enable=${{ matrix.flavor == 'latest' }}
            type=raw,value=rtorrent-${{ steps.prep.outputs.rtorrent_version }}-{{date 'YYYY.MM.DD'}},enable=${{ matrix.flavor == 'latest' }}
            type=raw,value=filebot,enable=${{ matrix.flavor == 'filebot' }}
            type=raw,value=filebot-rtorrent-${{ steps.prep.outputs.rtorrent_version }},enable=${{ matrix.flavor == 'filebot' }}
            type=raw,value=filebot-rtorrent-${{ steps.prep.outputs.rtorrent_version }}-{{date 'YYYY.MM.DD'}},enable=${{ matrix.flavor == 'filebot' }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            FILEBOT=${{ matrix.filebot }}
            RTORRENT_BRANCH=${{ steps.prep.outputs.rtorrent_branch }}
            BUILD_DATE=${{ steps.prep.outputs.build_date }}
            VCS_REF=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.flavor }}
          cache-to: type=gha,scope=${{ matrix.flavor }},mode=max
